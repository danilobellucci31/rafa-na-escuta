[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/gemini/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/gemini/tts"
  to = "/.netlify/functions/tts"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


